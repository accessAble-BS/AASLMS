<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course</title>
  <link rel="icon" href="/assets/brand/favicon.png" type="image/png">
  <link rel="stylesheet" href="/assets/styles.css">
</head>
<body class="viewer-body">
  <div id="viewerApp" class="viewer-app">
    <div id="viewerError" class="viewer-error hidden" role="alert"></div>
    <div id="viewerLoading" class="viewer-loading">Loading module...</div>

    <div id="viewerContent" class="viewer-content hidden">
      <div id="viewerSlide" class="viewer-slide-shell"></div>

      <div id="viewerComplete" class="viewer-complete hidden">
        <h2>Module complete</h2>
        <p>You have completed this module. Please return to Workhub.</p>
      </div>

      <nav id="viewerNav" class="viewer-nav" aria-label="Slide navigation">
        <button type="button" id="viewerPrevBtn" class="btn btn-secondary">← Previous</button>
        <span id="viewerSlideCounter" class="slide-counter">1 / 1</span>
        <button type="button" id="viewerNextBtn" class="btn btn-primary">Next →</button>
      </nav>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="/utils/firebase.js"></script>
  <script src="/utils/slides.js"></script>
  <script src="/assets/view.js"></script>
</body>
</html>
