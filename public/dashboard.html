<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LMS - Course Catalogue</title>
  <link rel="icon" href="/assets/brand/favicon.png" type="image/png">
  <link rel="stylesheet" href="/assets/styles.css">
  <style>
    body {
      background-image: url('/assets/brand/background-graphic.png');
      background-position: top right;
      background-repeat: no-repeat;
      background-size: cover;
      background-attachment: fixed;
    }
  </style>
</head>
<body>
  <header class="page-header">
    <img src="/assets/brand/logo.png" alt="Logo" class="header-logo">
    <h3 class="header-title">Course Catalogue</h3>
    <div class="header-actions" style="margin-left: auto;">
      <button type="button" id="logoutBtn" class="btn-icon" aria-label="Logout" title="Logout">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <path d="M16 17l5-5-5-5"></path>
          <path d="M21 12H9"></path>
        </svg>
      </button>
    </div>
  </header>

  <div class="page-shell">
    <main id="mainContent" class="card">
      <div class="catalogue-toolbar">
        <h1>Course Catalogue</h1>
        <div class="toolbar-actions">
          <input type="search" id="courseSearch" placeholder="Search courses..." aria-label="Search courses">
          <button type="button" id="addCourseBtn" class="btn btn-primary">Add Course</button>
        </div>
      </div>

      <div id="categoryFilter" class="category-filter" role="group" aria-label="Filter by category">
        <button type="button" class="category-chip active" data-category="all">All</button>
      </div>

      <div id="courseGallery" class="course-gallery" aria-live="polite"></div>
      <p id="emptyState" class="empty-state hidden">No courses found.</p>
    </main>

  </div>

  <div id="addCourseModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="addCourseHeading">
    <div class="modal-backdrop" data-modal-close></div>
    <div class="modal-dialog card">
      <div class="modal-header">
        <h2 id="addCourseHeading">Add Course</h2>
        <button type="button" class="btn-icon" data-modal-close aria-label="Close" title="Close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M18 6 6 18"></path>
            <path d="m6 6 12 12"></path>
          </svg>
        </button>
      </div>

      <form id="addCourseForm" class="add-course-form">
        <div class="form-field">
          <label for="courseName">Course name</label>
          <input type="text" id="courseName" name="name" required placeholder="Enter course name">
        </div>

        <div class="form-field">
          <label for="courseDescription">Description</label>
          <textarea id="courseDescription" name="description" rows="4" required placeholder="Describe the course"></textarea>
        </div>

        <div class="form-field">
          <label for="courseAuthor">Author</label>
          <input type="text" id="courseAuthor" name="author" required placeholder="Course author">
        </div>

        <div class="form-field">
          <label for="courseCategory">Category</label>
          <input type="text" id="courseCategory" name="category" list="categoryList" required placeholder="Select or type a category">
          <datalist id="categoryList"></datalist>
        </div>

        <div class="form-field">
          <label for="courseImage">Course image</label>
          <input type="file" id="courseImage" name="image" accept="image/*" required>
          <img id="imagePreview" class="image-preview hidden" alt="Course image preview">
        </div>

        <div id="addCourseError" class="error-message" role="alert"></div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-modal-close>Cancel</button>
          <button type="submit" id="submitCourseBtn" class="btn btn-primary">Create Course</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="/utils/firebase.js"></script>
  <script src="/utils/courses.js"></script>
  <script src="/utils/course-ui.js"></script>
  <script src="/utils/modal.js"></script>
  <script src="/assets/dashboard.js"></script>
</body>
</html>
